[pytest]
# ─────────────────────────────────────────────────────────────
# pytest.ini – Central configuration for API Testing Framework
# ─────────────────────────────────────────────────────────────

# Default options applied on every run
addopts =
    --html=reports/report.html
    --self-contained-html
    --tb=short
    -v

# Test discovery paths
testpaths = tests

# Custom markers
markers =
    smoke:      Fast, critical path checks (run first)
    regression: Full regression suite
    users:      Tests targeting the /users endpoint
    posts:      Tests targeting the /posts endpoint
    negative:   Negative / edge-case tests
    slow:       Tests expected to take longer than average

# Log settings (captured per test)
log_cli            = true
log_cli_level      = INFO
log_cli_format     = %(asctime)s [%(levelname)s] %(name)s – %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file            = reports/test_run.log
log_file_level      = DEBUG
log_file_format     = %(asctime)s [%(levelname)s] %(name)s – %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Retry flaky tests up to 1 time (requires pytest-rerunfailures)
# Uncomment if desired:
# reruns = 1
# reruns_delay = 2
